name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Root deps provide the test runner (Vitest) + integration test tooling;
      # server deps provide the modules the tested code imports (mongoose, etc.).
      - run: npm ci
      - run: npm ci --prefix server
      - run: npm run test:coverage

  client:
    name: Client lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      # Lint is informational for now (pre-existing issues across the app),
      # so it reports problems without failing the pipeline.
      - run: npm run lint
        continue-on-error: true
      - run: npm run build

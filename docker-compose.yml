# Local full-stack stack: MongoDB + API + static client.
# Usage: JWT_SECRET=your-secret docker compose up --build
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_CONNECTION: mongodb://mongo:27017/job-tracker
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - mongo

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo-data:
